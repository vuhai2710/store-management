# ============================================
# APPLICATION CONFIGURATION - EXAMPLE FILE
# ============================================
# 
# 🚀 CÁCH SỬ DỤNG ĐƠN GIẢN:
# 1. Tạo file application.yaml và copy file này sang
# 
# 2. CHỈ CẦN THAY ĐỔI MỘT THỨ DUY NHẤT:
#    - Mở file application.yaml
#    - Tìm dòng: password: 
#    - Điền MySQL password của bạn vào sau dấu hai chấm
#    - Ví dụ: password: your_mysql_password
# ============================================

server:
  port: 8080

spring:
  application:
    name: store-management

  # ============================================
  # DATABASE CONFIGURATION
  # ============================================
  datasource:
    url: jdbc:mysql://localhost:3306/store_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

  # ============================================
  # FLYWAY DATABASE MIGRATION
  # ============================================
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    baseline-version: 0
    validate-on-migrate: false

  # ============================================
  # FILE UPLOAD CONFIGURATION
  # ============================================
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ============================================
  # EMAIL CONFIGURATION (Optional - chỉ cần nếu dùng tính năng gửi email)
  # ============================================
  # Setup Instructions:
  # 1. Go to https://myaccount.google.com/security
  # 2. Enable "2-Step Verification"
  # 3. Create "App Password" at https://myaccount.google.com/apppasswords
  # 4. Use App Password (not your regular password)
  # 
  # Nếu không dùng email, có thể bỏ qua hoặc để giá trị mặc định
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# ============================================
# FILE STORAGE
# ============================================
file:
  upload:
    directory: uploads

# ============================================
# JWT CONFIGURATION
# ============================================
jwt:
  secret: dev-secret-key-for-store-management-min-32-chars-change-in-production
  signerKey: "dev-signer-key-base64-encoded-for-store-management-change-in-production-min-32-chars"
  expiration: 86400000 # 24 hours in milliseconds

# ============================================
# LOGGING
# ============================================
logging:
  level:
    com.storemanagement: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO

# ============================================
# PAYOS PAYMENT GATEWAY (Optional - chỉ cần nếu dùng thanh toán PayOS)
# ============================================
# Setup Instructions:
# 1. Register at https://my.payos.vn
# 2. Get Client ID, API Key, Checksum Key from PayOS dashboard
# 3. Setup ngrok for webhook: ngrok http 8080
# 4. Update webhook URL in PayOS dashboard
payos:
  client-id: "${PAYOS_CLIENT_ID:}" # Điền Client ID từ PayOS dashboard
  api-key: "${PAYOS_API_KEY:}" # Điền API Key từ PayOS dashboard
  checksum-key: "${PAYOS_CHECKSUM_KEY:}" # Điền Checksum Key từ PayOS dashboard
  webhook-url: "${PAYOS_WEBHOOK_URL:https://your-ngrok-url.ngrok.io/api/v1/payments/payos/webhook}" # Điền webhook URL (cần HTTPS)
  return-url: "http://localhost:3000/payment/success"
  cancel-url: "http://localhost:3000/payment/cancel"
  environment: "sandbox" # Options: sandbox, production
  base-url: "https://api-merchant.payos.vn"

# ============================================
# GHN (Giao Hàng Nhanh) SHIPPING (Optional - chỉ cần nếu dùng vận chuyển GHN)
# ============================================
# Setup Instructions:
# 1. Register at https://khachhang.ghn.vn
# 2. Get Token API from Profile → Token API
# 3. Get Shop ID from Shop Management
# 4. Setup ngrok for webhook: ngrok http 8080
# 5. Update webhook URL in GHN dashboard
ghn:
  token: "${GHN_TOKEN:}" # Điền Token API từ GHN dashboard
  shop-id: ${GHN_SHOP_ID:0} # Điền Shop ID từ GHN dashboard
  base-url: "https://dev-online-gateway.ghn.vn"
  webhook-url: "${GHN_WEBHOOK_URL:https://your-ngrok-url.ngrok.io/api/v1/ghn/webhook}" # Điền webhook URL (cần HTTPS)
  enabled: false # Đặt true khi đã có token và muốn sử dụng GHN
  environment: "sandbox" # Options: sandbox, production

# ============================================
# PRODUCT RECOMMENDATION (Content-based Filtering)
# ============================================
# Cấu hình cho hệ thống gợi ý sản phẩm sử dụng Python
python:
  executable: "python" # Hoặc "python3" trên Linux/Mac
  script:
    path: "product_recommendation_api.py" # Đường dẫn tới Python script (tương đối từ thư mục gốc project)

